site_name: pyvoicebox
site_description: Python port of the VOICEBOX Speech and Audio Processing toolbox
site_url: https://mfa-x-ai.github.io/pyvoicebox/
site_author: MFA-X-AI

repo_name: MFA-X-AI/pyvoicebox
repo_url: https://github.com/MFA-X-AI/pyvoicebox
edit_uri: edit/master/docs/

copyright: >
  Port of <a href="https://github.com/ImperialCollegeLondon/sap-voicebox">VOICEBOX</a>
  by Mike Brookes, Imperial College London.

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.svg
  icon:
    logo: custom/logo
    repo: fontawesome/brands/github
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_root_toc_entry: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            docstring_section_style: table
            heading_level: 3

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - overrides/assets/javascripts/mathjax.js
  - overrides/assets/javascripts/home.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js

extra_css:
  - overrides/assets/stylesheets/home.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MFA-X-AI/pyvoicebox
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pyvoicebox/

nav:
  - Home: index.md
  - Documentation:
      - Overview: overview.md
      - Getting Started: getting-started.md
      - Comparison: comparison.md
      - Testing: testing.md
      - Acknowledgements & License: acknowledgements.md
  - Examples:
      - examples/index.md
      - Visualize Speech: examples/speech-analysis.md
      - Speech Enhancement: examples/speech-enhancement.md
      - LPC Analysis: examples/lpc-analysis.md
      - Speaker Identification: examples/speaker-identification.md
      - Emotion Recognition: examples/emotion-recognition.md
  - API Reference:
      - api/index.md
      - Audio File I/O: api/audio-io.md
      - Frequency Scale Conversion: api/frequency-scales.md
      - Fourier, DCT & Hartley Transforms: api/transforms.md
      - Signal Processing: api/signal-processing.md
      - Speech Analysis: api/speech-analysis.md
      - Speech Recognition & Features: api/speech-recognition.md
      - LPC Analysis: api/lpc.md
      - Speech Enhancement: api/speech-enhancement.md
      - Speech Synthesis: api/speech-synthesis.md
      - Speech Coding: api/speech-coding.md
      - Random Numbers & Probability: api/probability.md
      - Vector Distance: api/vector-distance.md
      - Information Theory: api/information-theory.md
      - Rotations, Quaternions & Geometry: api/rotation-geometry.md
      - Printing & Display: api/plotting.md
      - Utility Functions: api/utility.md
