site_name: pyvoicebox
site_description: Python port of the VOICEBOX speech processing toolbox
repo_url: https://github.com/ImperialCollegeLondon/sap-voicebox

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            heading_level: 3

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - "Audio File I/O": api/audio-io.md
      - "Frequency Scale Conversion": api/frequency-scales.md
      - "Fourier, DCT & Hartley Transforms": api/transforms.md
      - "Random Numbers & Probability": api/probability.md
      - "Vector Distance": api/vector-distance.md
      - "Speech Analysis": api/speech-analysis.md
      - "LPC Analysis": api/lpc.md
      - "Speech Synthesis": api/speech-synthesis.md
      - "Speech Enhancement": api/speech-enhancement.md
      - "Speech Coding": api/speech-coding.md
      - "Speech Recognition & Features": api/speech-recognition.md
      - "Signal Processing": api/signal-processing.md
      - "Information Theory": api/information-theory.md
      - "Rotations, Quaternions & Geometry": api/rotation-geometry.md
      - "Printing & Display": api/plotting.md
      - "Utility Functions": api/utility.md
